aid: pocketbase
name: PocketBase
description: 'PocketBase is an open-source backend-as-a-service delivered as a single
  executable, providing a REST API for managing collections, records, authentication,
  file uploads, real-time subscriptions via Server-Sent Events, and admin management
  through a built-in dashboard. It embeds SQLite for persistent storage and supports
  OAuth2, OTP, and password-based authentication out of the box. Developers can extend
  PocketBase with custom business logic using Go or JavaScript hooks and event handlers.
  Official SDKs for JavaScript and Dart make client integration straightforward across
  web, mobile, and desktop platforms.

  '
