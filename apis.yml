apis:
- aid: pocketbase:records-api
  name: PocketBase Records API
  description: 'CRUD operations for collection records including list, view, create,
    update, delete, and batch operations. Supports filtering, sorting, pagination,
    relation expansion, field selection, and multipart file uploads.

    '
  humanURL: https://pocketbase.io/docs/api-records/
  baseURL: https://your-instance.pocketbase.io
  tags:
  - Records
  - Collections
  - CRUD
  properties:
  - type: Documentation
    url: https://pocketbase.io/docs/api-records/
  - url: graphql/pocketbase-graphql.md
    type: GraphQL
- aid: pocketbase:authentication-api
  name: PocketBase Authentication API
  description: 'Authentication endpoints supporting password-based login, OAuth2 providers,
    one-time passwords, token refresh, email verification, password reset, email change
    confirmation, and superuser impersonation.

    '
  humanURL: https://pocketbase.io/docs/api-records/
  baseURL: https://your-instance.pocketbase.io
  tags:
  - Authentication
  - OAuth2
  - OTP
  - JWT
  properties:
  - type: Documentation
    url: https://pocketbase.io/docs/api-records/
- aid: pocketbase:realtime-api
  name: PocketBase Realtime API
  description: 'Server-Sent Events (SSE) based real-time subscriptions for create,
    update, and delete record events across individual records or entire collections.
    Connections auto-disconnect after 5 minutes of inactivity.

    '
  humanURL: https://pocketbase.io/docs/api-realtime/
  baseURL: https://your-instance.pocketbase.io
  tags:
  - Realtime
  - SSE
  - Subscriptions
  properties:
  - type: Documentation
    url: https://pocketbase.io/docs/api-realtime/
- aid: pocketbase:files-api
  name: PocketBase Files API
  description: 'File download, thumbnail generation, and protected file token generation.
    File uploads are handled through the Records API using multipart form data. Supports
    on-the-fly image resizing and forced download responses.

    '
  humanURL: https://pocketbase.io/docs/api-files/
  baseURL: https://your-instance.pocketbase.io
  tags:
  - Files
  - Uploads
  - Images
  properties:
  - type: Documentation
    url: https://pocketbase.io/docs/api-files/
- aid: pocketbase:settings-api
  name: PocketBase Settings API
  description: 'Superuser-only endpoints for listing and updating application settings,
    testing S3 storage connectivity, sending test emails, generating Apple OAuth2
    client secrets, and configuring rate-limiting rules.

    '
  humanURL: https://pocketbase.io/docs/api-settings/
